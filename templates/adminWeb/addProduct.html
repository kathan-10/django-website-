<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product</title>
  <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
  <link href="/static/admin/css/styles.css" rel="stylesheet" />
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  <style>
    /* Form Styling */
    .form-container {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 700px;
      margin: auto;
    }
    .form-container h2 {
      margin-bottom: 20px;
      color: #007bff;
      text-align: center;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .btn-primary {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #0056b3;
    }
    .btn-secondary {
      background: #6c757d;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-secondary:hover {
      background: #565e64;
    }
    .form-actions {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body class="sb-nav-fixed">

  {% include "adminWeb/header.html" %}
  {% include "adminWeb/navbar.html" %}

  <div id="layoutSidenav_content">
    <main>
      <div class="container-fluid px-4">
        <h1 class="mt-4">Add Product</h1>
        <ol class="breadcrumb mb-4">
          <li class="breadcrumb-item"><a href="{% url 'view_product' %}">Products</a></li>
          <li class="breadcrumb-item active">Add Product</li>
        </ol>

        <!-- Add Product Form -->
        <div class="form-container">
          <h2><i class="fas fa-plus"></i> New Product</h2>
          <form method="POST"  action="{% url 'addProduct_details' %}" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
              <label for="pname">Product Name</label>
              <input type="text" id="pname" name="pname" >
            </div>

            <div class="form-group">
              <label for="pdesc">Description</label>
              <textarea id="pdesc" name="pdesc" ></textarea>
            </div>

            <div class="form-group">
              <label for="pprice">Price (Rs.)</label>
              <input type="text" id="pprice" name="pprice" >
            </div>

            <div class="form-group">
              <label for="pstock">Total Stock</label>
              <input type="text" id="pstock" name="pstock" >
            </div>

            <div class="form-group">
              <label for="pimg">Product Image</label>
              <input type="file" id="pimg" name="pimg" >
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Product</button>
              <a href="{% url 'view_product' %}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </main>
    {% include "adminWeb/footer.html" %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/admin/js/scripts.js"></script>
</body>
</html>
