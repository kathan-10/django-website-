<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Product</title>
  <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
  <link href="/static/admin/css/styles.css" rel="stylesheet" />
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  <style>
    .form-container {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 700px;
      margin: auto;
    }
    .form-container h2 {
      margin-bottom: 20px;
      color: #007bff;
      text-align: center;
    }
    .form-group { margin-bottom: 15px; }
    label { font-weight: 600; display: block; margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
    }
    textarea { resize: vertical; min-height: 80px; }
    .current-img {
      margin: 10px 0;
      display: block;
    }
    .current-img img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
    }
    .btn-primary {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-primary:hover { background: #0056b3; }
    .btn-secondary {
      background: #6c757d;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #565e64; }
    .form-actions { text-align: center; margin-top: 20px; }
  </style>
</head>
<body class="sb-nav-fixed">

  {% include "adminWeb/header.html" %}
  {% include "adminWeb/navbar.html" %}

  <div id="layoutSidenav_content">
    <main>
      <div class="container-fluid px-4">
        <h1 class="mt-4">Update Product</h1>
        <ol class="breadcrumb mb-4">
          <li class="breadcrumb-item"><a href="{% url 'view_product' %}">Products</a></li>
          <li class="breadcrumb-item active">Update Product</li>
        </ol>

        <!-- Update Product Form -->
        <div class="form-container">
          <h2><i class="fas fa-edit"></i> Edit Product</h2>
          <form method="POST" action="{% url 'updateProduct_details' product.id %}" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
              <label for="pname">Product Name</label>
              <input type="text" id="pname" name="pname" value="{{ product.pname }}" required>
            </div>

            <div class="form-group">
              <label for="pdesc">Description</label>
              <textarea id="pdesc" name="pdesc" required>{{ product.pdesc }}</textarea>
            </div>

            <div class="form-group">
              <label for="pprice">Price (Rs.)</label>
              <input type="number" id="pprice" name="pprice" value="{{ product.pprice }}" required>
            </div>


            <div class="form-group">
              <label for="pstock">Total Stock</label>
              <input type="number" id="pstock" name="pstock" value="{{ product.pstock }}" required>
            </div>

            <div class="form-group">
              <label>Current Image</label>
              <div class="current-img">
                <img src="/media/{{ product.pimg }}" alt="{{ product.pname }}">
              </div>
              <label for="pimg">Change Image (optional)</label>
              <input type="file" id="pimg" name="pimg">
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Update Product</button>
              <a href="{% url 'view_product' %}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </main>
    {% include "adminWeb/footer.html" %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/admin/js/scripts.js"></script>
</body>
</html>
