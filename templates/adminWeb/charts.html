<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics | Admin Panel</title>

    <!-- SB Admin Assets -->
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet">
    <link href="/static/admin/css/styles.css" rel="stylesheet">
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --border: #e5e7eb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --primary: #2563eb;
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
        }

        /* PAGE */
        .page {
            padding: 30px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 600;
            margin: 0;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
        }

        /* CARD */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 600;
            background: #fafafa;
        }

        .card-header i {
            color: var(--primary);
        }
.grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
}

        /* CARD BODY – PROPER SIZE */
        .card-body {
            padding: 20px;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-body img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* GRID HELPERS */
        .col-6 { grid-column: span 6; }
        .col-12 { grid-column: span 12; }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .col-6 { grid-column: span 12; }
            .card-body { height: 360px; }
            .page { padding: 20px; }
        }
    </style>
</head>

<body class="sb-nav-fixed">

<!-- HEADER -->
{% include "adminWeb/header.html" %}

<!-- SIDEBAR -->
{% include "adminWeb/navbar.html" %}

<div id="layoutSidenav_content">
<main>
    <div class="page">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <h1 class="page-title">Analytics Dashboard</h1>
            <div class="breadcrumb">Admin / Analytics</div>
        </div>

        <!-- CHARTS -->
        <div class="grid">

            <!-- ORDERS TREND -->
            <div class="card col-6">
                <div class="card-header">
                    <i class="fas fa-chart-line"></i>
                    Orders Trend (Per Day)
                </div>
                <div class="card-body">
                    <img src="data:image/png;base64,{{ trend_graph }}" alt="Orders Trend">
                </div>
            </div>

            <!-- PAYMENT METHODS -->
            <div class="card col-6">
                <div class="card-header">
                    <i class="fas fa-credit-card"></i>
                    Payment Methods
                </div>
                <div class="card-body">
                    <img src="data:image/png;base64,{{ payment_graph }}" alt="Payment Methods">
                </div>
            </div>

            <!-- REVENUE -->
            <div class="card col-12">
                <div class="card-header">
                    <i class="fas fa-indian-rupee-sign"></i>
                    Revenue Per Day
                </div>
                <div class="card-body">
                    <img src="data:image/png;base64,{{ revenue_graph }}" alt="Revenue Per Day">
                </div>
            </div>

        </div>

    </div>
</main>

<!-- FOOTER -->
{% include "adminWeb/footer.html" %}
</div>

</body>
</html>
