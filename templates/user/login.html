<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Fruitables</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #7fad39;
      margin-bottom: 30px;
    }
    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: 600;
      color: #333;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      box-sizing: border-box;
    }
    .forgot-password {
      text-align: right;
      margin-top: 8px;
    }
    .forgot-password a {
      font-size: 14px;
      color: #7fad39;
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-password a:hover {
      text-decoration: underline;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #7fad39;
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border-radius: 5px;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #689f38;
    }
    .register-link {
      text-align: center;
      margin-top: 20px;
    }
    .register-link a {
      color: #7fad39;
      text-decoration: none;
      font-weight: 500;
    }
    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login to Your Account</h2>

    <form action="{% url 'loginDetails' %}" method="POST">
      {% csrf_token %}

      <label>Email</label>
      <input type="text" name="email" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <div class="forgot-password">
        <a href="{% url 'forgot_password' %}">Forgot password?</a>
      </div>

      <button type="submit">Login</button>
    </form>

    <div class="register-link">
      Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </div>
  </div>
</body>
</html>
